name: ShellCheck

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt update && sudo apt install -y shellcheck

      - name: ShellCheck
        run: shellcheck system-update-manager.sh

      - name: Bash Syntax Check
        run: bash -n system-update-manager.sh
